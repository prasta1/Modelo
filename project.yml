name: Modelo
options:
  bundleIdPrefix: com.peregrine
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
settings:
  base:
    # Automatic signing lets Xcode pick the right identity per machine.
    CODE_SIGN_STYLE: Automatic
    CODE_SIGN_IDENTITY: "Apple Development"
    DEVELOPMENT_TEAM: WXQ53X7LZ7
targets:
  Modelo:
    type: application
    platform: macOS
    sources:
      - Modelo
    # Explicit Info.plist (not GENERATE_INFOPLIST_FILE) so we can declare an ATS
    # exception: LM Studio serves plain HTTP over Tailscale, which App Transport
    # Security blocks by default — without this, every request silently fails and
    # servers always read as offline.
    info:
      path: Modelo/Info.plist
      properties:
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        LSMinimumSystemVersion: "$(MACOSX_DEPLOYMENT_TARGET)"
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
        NSHumanReadableCopyright: "© 2025 Patrick Ruster"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.peregrine.modelo
        PRODUCT_NAME: Modelo
        PRODUCT_MODULE_NAME: Modelo
        MARKETING_VERSION: "0.1"
        CURRENT_PROJECT_VERSION: "1"
        ENABLE_HARDENED_RUNTIME: YES
        SWIFT_VERSION: "5.0"
  ModeloTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - ModeloTests
    dependencies:
      - target: Modelo
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        SWIFT_VERSION: "5.0"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Modelo.app/Contents/MacOS/Modelo"
        BUNDLE_LOADER: "$(TEST_HOST)"
schemes:
  Modelo:
    build:
      targets:
        Modelo: all
    test:
      targets:
        - ModeloTests
